<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Voice Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#111111; --surface:#1a1a1a; --surface2:#222222; --surface3:#2a2a2a;
  --brand:#3B82F6; --brand-dim:rgba(59,130,246,0.12); --accent:#F59E0B;
  --text:#f2f2f2; --dim:rgba(242,242,242,0.5); --muted:rgba(242,242,242,0.25);
  --border:rgba(255,255,255,0.07); --r-card:20px;
}
html,body { height:100%; font-family:'Space Grotesk',sans-serif; background:#000; color:var(--text); }
::-webkit-scrollbar { display:none; } * { scrollbar-width:none; }
button { font-family:inherit; }

@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes scaleIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes slideLeft { from{transform:translateX(-100%)} to{transform:translateX(0)} }

.app-shell { width:100%; max-width:430px; margin:0 auto; height:100dvh; display:flex; flex-direction:column; position:relative; overflow:hidden; background:var(--bg); }
.top-bar { padding:16px 20px 12px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; z-index:10; }
.menu-btn { background:none; border:none; cursor:pointer; width:44px; height:44px; display:flex; flex-direction:column; gap:5px; align-items:center; justify-content:center; border-radius:12px; }
.menu-btn span { display:block; height:1.5px; background:rgba(242,242,242,.5); border-radius:1px; }
.brand { display:flex; align-items:center; gap:8px; }
.brand-icon { width:26px; height:26px; border-radius:7px; background:var(--brand); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:9px; color:#fff; letter-spacing:-0.5px; }
.brand-name { font-weight:700; font-size:15px; color:var(--accent); letter-spacing:2px; }
.brand-sub { font-weight:300; font-size:13px; color:rgba(255,255,255,.35); }
.status-box { width:44px; height:44px; border-radius:14px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
.status-dot { width:8px; height:8px; border-radius:50%; background:#ef4444; transition:all .3s; }
.status-dot.connected { background:#4ade80; box-shadow:0 0 8px #4ade80; }

.chat-area { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
.welcome { padding:4px 20px 20px; display:flex; flex-direction:column; }
.welcome.hidden { display:none; }
.welcome h2 { font-size:24px; font-weight:700; margin-bottom:4px; line-height:1.2; animation:fadeUp .5s ease .1s both; }
.welcome p { font-size:14px; font-weight:400; color:var(--dim); line-height:1.5; animation:fadeUp .5s ease .1s both; }
.welcome-label { font-size:13px; font-weight:600; letter-spacing:.2px; margin:24px 0 12px; animation:fadeUp .5s ease .2s both; }
.suggestions { display:flex; flex-direction:column; gap:10px; animation:fadeUp .5s ease .3s both; }
.sugg-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-card); padding:14px 16px; display:flex; align-items:center; gap:14px; cursor:pointer; text-align:left; width:100%; transition:all .2s ease; min-height:44px; font-family:inherit; color:var(--text); }
.sugg-card:hover { background:var(--surface2); border-color:var(--brand); }
.sugg-icon { width:44px; height:44px; border-radius:14px; flex-shrink:0; background:rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center; font-size:20px; }
.sugg-title { font-size:14px; font-weight:500; margin-bottom:2px; }
.sugg-desc { font-size:12px; font-weight:400; color:var(--dim); }
.divider-hint { margin-top:28px; display:flex; align-items:center; gap:12px; animation:fadeUp .5s ease .5s both; }
.divider-hint hr { flex:1; height:1px; background:var(--border); border:none; }
.divider-hint span { font-size:11px; color:var(--muted); font-weight:500; }

.messages { padding:16px 0 12px; display:flex; flex-direction:column; }
.msg { display:flex; align-items:flex-end; gap:8px; padding:0 16px; margin-bottom:12px; animation:fadeUp .3s ease; }
.msg.user { flex-direction:row-reverse; }
.msg-avatar { width:32px; height:32px; border-radius:10px; background:var(--brand); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; font-weight:700; color:#fff; }
.msg-bubble { max-width:75%; padding:12px 14px; font-size:14px; font-weight:400; line-height:1.65; }
.msg.user .msg-bubble { border-radius:18px 18px 4px 18px; background:var(--brand); color:white; }
.msg.assistant .msg-bubble { border-radius:4px 18px 18px 18px; background:var(--surface2); border:1px solid var(--border); }
.msg-cursor { display:inline-block; width:2px; height:13px; background:var(--accent); margin-left:2px; animation:blink .7s step-end infinite; vertical-align:middle; }

.tool-pill { display:flex; justify-content:center; padding:4px 16px 12px; animation:fadeIn .3s ease; }
.tool-pill-inner { display:inline-flex; align-items:center; gap:8px; background:rgba(245,158,11,.07); border:1px solid rgba(245,158,11,.15); border-radius:100px; padding:6px 16px; font-size:12px; color:rgba(245,158,11,.85); font-weight:500; }
.tool-spinner { width:11px; height:11px; border:2px solid rgba(245,158,11,.6); border-top-color:transparent; border-radius:50%; animation:spin .8s linear infinite; }

.input-area { padding:8px 16px 4px; background:var(--bg); flex-shrink:0; border-top:1px solid var(--border); }
.input-row { display:flex; align-items:center; gap:10px; background:var(--surface); border-radius:16px; padding:6px 6px 6px 16px; border:1px solid var(--border); }
.input-row input { flex:1; background:transparent; border:none; outline:none; font-size:14px; color:var(--text); font-family:'Space Grotesk',sans-serif; padding:6px 0; }
.input-row input::placeholder { color:var(--muted); }
.send-btn { width:40px; height:40px; border-radius:12px; background:var(--brand); border:none; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; animation:scaleIn .2s cubic-bezier(.34,1.56,.64,1); }
.mic-inline-btn { width:40px; height:40px; border-radius:12px; flex-shrink:0; border:none; cursor:pointer; background:var(--surface3); display:flex; align-items:center; justify-content:center; transition:all .25s ease; }
.mic-inline-btn.active { background:rgba(245,158,11,.12); }

.bottom-nav { height:72px; display:flex; align-items:center; padding:0 8px 8px; background:var(--bg); border-top:1px solid var(--border); flex-shrink:0; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; cursor:pointer; padding:8px 0; min-height:44px; }
.nav-label { font-size:10px; font-weight:500; color:rgba(255,255,255,.3); }
.nav-label.active { color:var(--text); }
.fab-mic { width:56px; height:56px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .3s ease; flex-shrink:0; margin-top:-20px; }
.fab-mic.idle { background:var(--brand); box-shadow:0 4px 20px rgba(59,130,246,.45); }
.fab-mic.recording { background:var(--accent); box-shadow:0 4px 20px rgba(245,158,11,.4); }

.sidebar-overlay { position:absolute; inset:0; z-index:200; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); animation:fadeIn .2s ease; }
.sidebar-overlay.hidden { display:none; }
.sidebar-panel { position:absolute; top:0; left:0; bottom:0; width:272px; background:#141414; border-right:1px solid var(--border); z-index:201; display:flex; flex-direction:column; animation:slideLeft .28s ease; padding:56px 0 32px; }
.sidebar-panel.hidden { display:none; }
.sidebar-brand { padding:0 20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
.sidebar-nav { flex:1; padding:16px 12px; }
.sidebar-nav-item { width:100%; display:flex; align-items:center; gap:14px; padding:13px 14px; border-radius:12px; background:transparent; border:none; cursor:pointer; color:var(--dim); font-size:14px; text-align:left; min-height:44px; font-family:inherit; }
.sidebar-nav-item:hover { background:rgba(255,255,255,.05); color:var(--text); }
.sidebar-config { margin:0 16px 20px; padding:16px; border-radius:14px; background:rgba(255,255,255,.03); border:1px solid var(--border); }
.sidebar-config-title { font-size:10px; font-weight:600; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
.sidebar-config-row { display:flex; justify-content:space-between; margin-bottom:8px; font-size:12px; }
.sidebar-footer { text-align:center; font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
</style>
</head>
<body>
<div class="app-shell">
  <div class="top-bar">
    <button class="menu-btn" id="menuBtn"><span style="width:22px"></span><span style="width:16px"></span><span style="width:20px"></span></button>
    <div class="brand">
      <div class="brand-icon" id="brandIcon">AI</div>
      <span class="brand-name" id="brandName">ACME</span>
      <span class="brand-sub" id="brandSub">Assistant</span>
    </div>
    <div class="status-box"><div class="status-dot" id="statusDot"></div></div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <h2 id="greeting">Hi there! 👋</h2>
      <p id="greetingSub">How can I help you today?</p>
      <div class="welcome-label">Quick actions</div>
      <div class="suggestions" id="suggestions"></div>
      <div class="divider-hint"><hr><span>or just talk</span><hr></div>
    </div>
    <div class="messages" id="messages"></div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input type="text" id="textInput" placeholder="Type your question…" autocomplete="off">
      <button class="send-btn" id="sendBtn" style="display:none">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="mic-inline-btn" id="micInlineBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="11" rx="3" stroke="rgba(255,255,255,.55)" stroke-width="1.8"/><path d="M5 11a7 7 0 0 0 14 0" stroke="rgba(255,255,255,.55)" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="rgba(255,255,255,.55)" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="white" stroke-width="1.8" fill="var(--brand)" stroke-linejoin="round"/></svg>
      <span class="nav-label active">Assistant</span>
    </button>
    <div style="display:flex;flex-direction:column;align-items:center;padding:0 4px">
      <button class="fab-mic idle" id="fabMic">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="11" rx="3" fill="white"/><path d="M5 11a7 7 0 0 0 14 0" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <span class="nav-label" id="fabLabel" style="margin-top:4px">Talk</span>
    </div>
    <button class="nav-item" id="photoNavBtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="3" stroke="rgba(255,255,255,.35)" stroke-width="1.8"/><circle cx="12" cy="12" r="3.5" stroke="rgba(255,255,255,.35)" stroke-width="1.8"/></svg>
      <span class="nav-label">Photo</span>
    </button>
  </div>

  <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>
  <div class="sidebar-panel hidden" id="sidebarPanel">
    <div class="sidebar-brand">
      <div class="brand-icon" id="sidebarBrandIcon" style="width:36px;height:36px;border-radius:10px;font-size:12px">AI</div>
      <div>
        <div style="font-weight:700;font-size:15px;color:var(--accent);letter-spacing:1.5px" id="sidebarBrandName">ACME</div>
        <div style="font-weight:300;font-size:11px;color:var(--muted)">Voice Assistant</div>
      </div>
    </div>
    <div class="sidebar-nav">
      <button class="sidebar-nav-item" id="newConvBtn"><span style="font-size:18px">💬</span>New conversation</button>
      <button class="sidebar-nav-item" id="attachPhotoBtn"><span style="font-size:18px">📷</span>Attach photo</button>
    </div>
    <div class="sidebar-config">
      <div class="sidebar-config-title">Configuration</div>
      <div class="sidebar-config-row"><span style="color:var(--dim)">AI Engine</span><span style="font-weight:500">Nova 2 Sonic</span></div>
      <div class="sidebar-config-row"><span style="color:var(--dim)">Voice</span><span style="font-weight:500" id="voiceLabel">—</span></div>
    </div>
    <div class="sidebar-footer">Powered by AWS</div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="app.js"></script>
</body>
</html>
